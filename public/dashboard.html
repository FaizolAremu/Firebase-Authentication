<body>

    <button onclick="send()">Send</button>

<script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";




    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
        apiKey: "AIzaSyAl_iqoycSwSaNOJ5CiscsTiWXhg7XFBSQ",
        authDomain: "introduction-to-firebase-755b8.firebaseapp.com",
        databaseURL: "https://introduction-to-firebase-755b8-default-rtdb.firebaseio.com",
        projectId: "introduction-to-firebase-755b8",
        storageBucket: "introduction-to-firebase-755b8.firebasestorage.app",
        messagingSenderId: "44048820667",
        appId: "1:44048820667:web:44265d68846ca623f33c9e",
        measurementId: "G-YH1CS4GF9Q"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth();
    const db = getDatabase();

    let userName;
    let email;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            console.log(user);
            userName = user.displayName
            email = user.email
            show.innerHTML = `
                <p>Welcome ${userName}</p>
                <p>Your email is ${email}</p>
            `
            console.log(userName, email)
            // const uid = user.uid;

        } else {
            setTimeout(() => {
                window.location.href = 'index.html'
            }, 1000);
        }
    });


    const send = () => {
        // alert('working')
        const message = document.getElementById('msg').value;

        if (message.trim() === '') {
            alert('Input is empty')
        } else {
            // console.log(message)
            const msgRef = ref(db, 'messages/0')
            set(msgRef, {
                message,
                time: new Date().toLocaleTimeString()
                
            });
            console.log(message);
        }
    }
    window.send = send

    const reference = ref(db, 'messages')
    onValue(reference, (snapshot) => {
        const data = snapshot.val();
        console.log(data);
    });

</script>
