<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 380px;
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
  }

  h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #222;
  }

  /* INPUT BOX */
  .input-box {
    position: relative;
    margin-bottom: 20px;
  }

  .input-box input {
    width: 100%;
    padding: 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    font-size: 15px;
    background: transparent;
  }

  .input-box label {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #777;
    pointer-events: none;
    transition: 0.3s ease;
    background: white;
    padding: 0 5px;
  }

  /* FLOAT LABEL EFFECT */
  .input-box input:focus+label,
  .input-box input:valid+label {
    top: -8px;
    font-size: 12px;
    color: #6c63ff;
  }

  /* BUTTONS */
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 10px;
  }

  #signupBtn {
    background: #6c63ff;
    color: white;
    font-weight: bold;
  }

  .google-btn {
    background: #db4437;
    color: white;
  }

  .github-btn {
    background: #24292e;
    color: white;
  }

  .divider {
    text-align: center;
    margin: 15px 0;
    color: #777;
  }

  p {
    text-align: center;
    margin-top: 15px;
  }

  a {
    color: #6c63ff;
    text-decoration: none;
  }
</style>

<body>
  <div class="container">
    <h1>Create Account</h1>

    <!-- First Name -->
    <div class="input-box">
      <input type="text" id="firstName" required>
      <label for="firstName">First Name</label>
    </div>

    <!-- Last Name -->
    <div class="input-box">
      <input type="text" id="lastName" required>
      <label for="lastName">Last Name</label>
    </div>

    <!-- Email -->
    <div class="input-box">
      <input type="email" id="mail" required>
      <label for="email">Email Address</label>
    </div>

    <!-- Password -->
    <div class="input-box">
      <input type="password" id="password" required>
      <label for="password">Password</label>
    </div>

    <button id="signupBtn" onclick="signUp()">Sign Up</button>

    <div class="divider">OR</div>

    <button class="google-btn" id="googleBtn" onclick="signInWithGoogle()">Sign in with Google</button>
    <button class="github-btn" id="githubBtn" onclick="signInWithGithub()">Sign in with GitHub</button>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

  const signUp = () => {
    const first_name = document.getElementById("firstName").value;

      })

        } else if (errorCode === 'auth/password-does-not-meet-requirements') {
          alert("Password should be at least 8 characters");
        } else {
          alert(errorMessage);
        }
      });


  }

  window.signUp = signUp
