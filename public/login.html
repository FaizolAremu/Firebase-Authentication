<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 380px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #222;
        }

        /* INPUT BOX */
        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            background: transparent;
        }

        .input-box label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            pointer-events: none;
            transition: 0.3s ease;
            background: white;
            padding: 0 5px;
        }

        /* FLOAT LABEL EFFECT */
        .input-box input:focus+label,
        .input-box input:valid+label {
            top: -8px;
            font-size: 12px;
            color: #6c63ff;
        }

        /* BUTTONS */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
        }

        #signupBtn {
            background: #6c63ff;
            color: white;
            font-weight: bold;
        }

        .google-btn {
            background: #db4437;
            color: white;
        }

        .github-btn {
            background: #24292e;
            color: white;
        }

        .divider {
            text-align: center;
            margin: 15px 0;
            color: #777;
        }

        p {
            text-align: center;
            margin-top: 15px;
        }

        a {
            color: #6c63ff;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome Back</h1>

        <div class="input-box">
            <input type="email" id="email" required>
            <label>Email Address</label>
        </div>

        <div class="input-box">
            <input type="password" id="password" required>
            <label>Password</label>
        </div>

        <button onclick="signIn()">Sign In</button>

        <div class="divider">OR</div>

        <button class="google-btn" onclick="signInWithGoogle()">
            Sign in with Google
        </button>

        <button class="github-btn" onclick="signInWithGithub()">
            Sign in with GitHub
        </button>

        <p>
            Don't have an account?
            <a href="index.html">Sign Up</a>
        </p>
    </div>
</body>

</html>
